你是一名资深前端工程师 + 移动端网页设计师，请根据以下完整需求，直接产出一个高完成度的 React 手机端 H5 页面代码。

## 项目名称

《艺起逛杭州》—— 领队队长点赞榜

## 项目背景

这是一个活动互动页，目标用户是参展人员。页面主要在手机端访问，用于展示“领队队长点赞榜”，并支持用户实时点赞。页面风格要精致、清爽、有艺术感，参考小红书页面气质，但要更偏活动页和简约艺术风，不要做成后台系统或廉价投票页。

## 页面目标

请实现一个手机端优先的单页 H5 页面，完成以下核心目标：

1. 展示领队队长点赞榜
2. 每个榜单项显示头像、昵称、点赞数量
3. 用户可以点击点赞按钮
4. 点赞后点赞数立即更新
5. 榜单根据点赞数自动重新排序
6. 如果排名变化，列表位置切换要有平滑动画
7. 页面整体视觉要有简约艺术感和活动品质感

## 风格要求

请严格按照以下视觉方向设计：

* 简约艺术风
* 小红书式清爽感、留白感、轻卡片感
* 现代、年轻、温和、克制
* 有一点杭州城市漫游和艺术活动氛围
* 不要大红大绿
* 不要后台系统感
* 不要廉价投票页感
* 不要过于炫技的科技风
* 不要堆砌复杂装饰

## 页面结构

页面为单页，包含三个主要区域：

### 1）顶部活动信息区

展示以下内容：

* 活动名称：艺起逛杭州
* 榜单标题：领队队长点赞榜
* 一句引导文案，例如：为你喜欢的领队队长送上一颗小心心

设计要求：

* 顶部简洁，留白充足
* 可加入轻微艺术感装饰元素，如柔和渐变、极简线条、小面积几何元素
* 整体要克制精致，不喧宾夺主

### 2）榜单列表区

这是页面核心区域。

每个榜单项展示字段只有：

* 头像
* 昵称
* 点赞数量

布局建议：

* 左侧头像
* 中间昵称
* 右侧点赞数量和点赞按钮

列表要求：

* 默认按点赞数量从高到低排序
* 排名前三有轻微视觉强化，但要高级克制
* 其他名次保持统一简洁

前三名强化建议：

* TOP1：淡金色微点缀
* TOP2：浅银灰微点缀
* TOP3：浅暖棕微点缀
* 可用小标签、边框微高亮、角标等方式实现
* 不要夸张奖杯风或电竞风

榜单卡片要求：

* 白色或浅暖白卡片
* 柔和圆角
* 阴影很轻
* 纵向间距舒适
* 看起来像真实活动页卡片，而不是默认 UI 组件

### 3）底部说明区

展示一行辅助文案，例如：

* 榜单实时更新，请为你支持的领队队长点赞
* 每次点赞都会即时计入榜单

要求：

* 文字小而清晰
* 样式低调
* 作为页面结尾信息存在

## 功能要求

### 1）榜单展示

* 页面初始显示 8～12 条演示数据
* 数据包含：id、name、avatar、likes
* 榜单按 likes 从高到低排序显示

### 2）点赞功能

* 用户点击点赞按钮后，对应数据 likes +1
* 页面立即更新
* 榜单自动重新排序
* 点赞行为不需要页面刷新

### 3）动画要求

* 点赞按钮点击时有轻微反馈动画，例如心形缩放、按钮高亮、数字轻微跳动
* 如果排名变化，榜单重排要有平滑过渡动画
* 动画要自然、精致、克制，不要夸张

### 4）演示数据要求

请生成 8～12 条默认演示数据，昵称风格要自然，并带一点杭州感、艺术感、活动感，例如：

* 西湖漫游队长
* 艺术散步领队
* 杭州灵感捕手
* 运河观察员
* 美术馆引路人
* 湖畔策展同行者
* 城市步履领队
* 展馆灵感导览员

点赞数需要有高低差异，便于形成榜单层次。头像可使用统一风格的占位头像。

## 技术要求

请使用以下技术栈：

* React
* Tailwind CSS
* Framer Motion（用于列表重排和微动效）

代码要求：

* 输出完整可运行代码
* 优先写成一个高完成度的 MVP 页面
* 组件结构清晰
* 注释简洁
* 易于维护
* 易于后续接接口

建议组件拆分：

* LeaderboardPage
* HeaderSection
* LeaderboardList
* LeaderboardCard
* FooterNote
* LikeButton（可选）
* TopRankBadge（可选）

## 移动端要求

* 手机端优先设计
* 整体内容区域建议设置合理最大宽度，例如 420px 左右
* 触控区域足够大
* 页面纵向滚动自然
* 卡片与按钮适合手机单手操作
* 桌面端打开时也能居中展示移动端效果

## 配色建议

* 页面背景：暖白 / 米白 / 极浅灰白
* 卡片背景：白色
* 主文字：深灰黑
* 辅助文字：中灰
* 强调色：温柔珊瑚红 / 柔和橘红 / 克制的小红书感红色
* TOP1 / TOP2 / TOP3：使用浅金、浅银灰、浅暖棕点缀

## 文案语气要求

* 年轻
* 温和
* 自然
* 不要太官方
* 不要营销腔过重

## 后续接口预留

虽然第一阶段先实现前端本地版本，但请在代码中明确预留未来接入后端接口的位置。

例如：

* 获取榜单：GET /api/leaderboard
* 点赞接口：POST /api/leaderboard/:id/like

请在代码中写清楚 mock 数据区域，以及未来替换接口的注释位置。

## 当前不需要实现的功能

请不要扩展以下内容：

* 登录
* 用户鉴权
* 点赞限制
* 搜索
* 筛选
* 分享海报
* 详情页
* 多榜单切换
* 后台管理

## 最终输出要求

请直接输出：

1. 完整 React 代码
2. 使用 Tailwind CSS
3. 使用 Framer Motion 实现必要动画
4. 代码具有较高视觉完成度
5. 页面看起来像真实活动 H5，而不是普通 demo
6. 默认就带完整演示数据
7. 注释清晰，方便后续继续开发


请特别注意以下质量要求：

1. 不要生成普通后台 UI 风格
2. 不要用表格展示榜单
3. 不要让视觉显得廉价或拥挤
4. 不要滥用大面积高饱和红色
5. 不要把页面做成“投票小程序模板感”
6. 要重视手机端观感和触控体验
7. 要通过留白、卡片比例、字体层级、轻微动效体现高级感
8. 要保证页面第一眼就像“真实活动页”
9. 前三名样式要有区别，但必须克制
10. 请把重点放在“简约、精致、真实可用”上，而不是堆功能
