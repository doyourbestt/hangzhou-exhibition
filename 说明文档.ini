## 一、页面定位

这是一个活动 H5 的**入场页 / 轻登录页**，不是后台系统登录页，不是管理平台登录页，也不是传统账号密码登录页。

页面所属活动名称：

**艺起逛杭州**

页面目标：

让用户通过一个非常轻的登录动作进入活动，然后去参与 **“领队队长点赞榜”**，支持自己喜欢的领队队长。

所以这个页面的气质应该是：

* 欢迎进入活动
* 轻松开始参与
* 有一点艺术展活动感
* 精致、清爽、克制
* 手机端体验好

而不是：

* 原始表单页
* 系统后台登录页
* 粗糙的白底输入框页面

---

## 二、当前页面存在的问题（必须完全修正）

当前登录页的问题很明显，请你不要复制这些问题：

1. 所有元素几乎都贴着左边排布，没有版心
2. 信息层级混乱，标题、字段标题、说明文字都差不多重
3. 输入框像浏览器默认样式，很丑
4. logo 非常突兀，没有融入整体
5. 页面没有“活动入场感”，像普通填表页
6. 按钮缺乏主操作感，看不出这是最重要的动作
7. 协议区域很粗糙，像临时拼接
8. 页面上下留白和节奏都不舒服
9. 缺少精致感和结构感
10. 整体不像真实产品，而像未完成原型

请彻底避免这些问题。

---

## 三、设计目标

请设计一个看起来像**真实活动 H5 入场页**的登录界面，要求：

* 手机端优先
* 页面有明确版心
* 信息层级清晰
* 视觉上干净、轻盈、自然
* 带一点杭州 / 艺术活动 / 漫游感
* 有小红书那种“舒服、精致、干净”的感觉
* 但不要直接照搬小红书模板
* 页面看起来像进入活动，而不是系统登录

---

## 四、页面结构（严格按这个结构来）

整个页面从上到下分成 4 个区域：

1. 顶部品牌区
2. 欢迎文案区
3. 登录表单卡片区
4. 底部轻说明区

---

### 1）顶部品牌区

#### 作用

告诉用户这是哪个活动，但不要过于抢眼。

#### 内容

* 活动名称：艺起逛杭州
* 可配一个极简的小图形 / 小 logo / 小标记
* 整体要轻，不要出现突兀的大红块 logo

#### 布局

* 建议顶部居中
* 与页面顶部有足够安全距离
* 不要贴边
* 不要拥挤

#### 风格

* 极简
* 轻
* 有一点活动品牌感
* 不要过于商业 Logo 感

---

### 2）欢迎文案区

#### 作用

这是页面的第一视觉焦点。

#### 内容建议

主标题：
**欢迎来到艺起逛杭州**

副标题：
**完成轻登录，开始你的支持之旅**

也可以微调，但整体语气必须：

* 温和
* 有邀请感
* 不要宣传横幅感
* 不要口号太硬

#### 排版要求

* 居中排版
* 主标题较明显，但不要过粗过大
* 副标题更轻、更淡
* 两者之间有舒服的行距
* 和上下区域的距离要合适

#### 视觉要求

用户第一眼应该先看到欢迎感，而不是字段标题。

---

### 3）登录表单卡片区（核心）

这是页面最重要的区域。

#### 形式

请用一个**白色圆角卡片**承载整个表单。
不要让输入框直接裸露在背景页面上。

#### 卡片风格要求

* 白色 / 微暖白
* 大圆角
* 很轻的阴影
* 内边距充足
* 有高级感，但不要过度装饰

#### 卡片内部内容顺序

从上到下依次为：

##### A. 邀请码输入项

* 字段标题：邀请码
* 占位文字：请输入参展码 / 邀请码

要求：

* 字段标题不要太大
* 输入框高度舒适
* 使用浅灰色边框
* 圆角明显
* 内边距舒服
* 不要黑色硬边框
* 不要默认浏览器输入框感觉

##### B. 群昵称输入项

* 字段标题：群昵称
* 占位文字：请输入你在群里的昵称

要求同上，和邀请码输入项视觉统一。

##### C. 协议勾选项

文案建议：
**我已阅读并同意《用户协议》与《隐私政策》**

要求：

* 使用真正的 checkbox 样式
* 文案变轻，不要很粗很大
* 链接文字可略微突出
* 这一行应该是辅助信息，不是视觉重点
* 不要出现奇怪的小黑点或排版错误

##### D. 主按钮

按钮文案：
**进入点赞榜**

也可以是：

* 开始支持
* 进入活动

但优先建议：**进入点赞榜**

按钮要求：

* 宽按钮
* 是整个页面最明确的主操作
* 要有明显按钮感
* 不能像禁用态灰按钮
* 和输入框之间有舒服的距离
* 圆角柔和
* 视觉上精致，不要廉价

---

### 4）底部轻说明区

#### 作用

降低用户顾虑，但不要抢视觉。

#### 内容建议

只保留一行轻说明，例如：

* 仅用于本次活动互动
* 轻登录后即可参与支持
* 活动期间使用，保护你的隐私

#### 要求

* 不要再放大段系统条款文案
* 不要放“登录即表示你同意我们的条款和条件”这种很硬的模板句
* 字号小
* 颜色浅
* 居中

---

## 五、布局要求（非常重要）

请特别注意布局，不要再出现“贴边”和“没有版心”的问题。

### 必须做到

1. 页面内容有明确版心
2. 左右边距舒服
3. 顶部、中部、底部有清晰节奏
4. 页面不是一整块从左往下堆字段
5. 表单区域和背景有层次分离

### 推荐布局感受

页面看起来应该像这样：

* 上面有轻品牌感
* 中间有欢迎感
* 再下面是一个精致卡片
* 按钮是清晰的主操作
* 最下面一行轻说明收尾

而不是：

* 一堆字
* 一堆框
* 一堆边线
* 一页表单

---

## 六、视觉风格要求

### 整体气质

* 简约艺术风
* 轻
* 干净
* 留白舒服
* 有活动感
* 有一点温度
* 不冷硬

### 颜色建议

* 背景：暖白 / 米白 / 极浅灰白
* 卡片：白色
* 主文字：深灰，不要纯黑过重
* 辅助文字：中灰
* 边框：浅灰
* 主按钮：柔和强调色（不要荧光红，不要过艳）
* 链接：可轻微强调但不要刺眼

### 字体层级

* 活动名称：小
* 主标题：中大
* 副标题：中小
* 字段标题：小
* 占位文字：中小
* 底部说明：小

### 视觉禁止项

* 不要黑色粗描边
* 不要贴边
* 不要默认浏览器表单样式
* 不要土味红色大按钮
* 不要过于空旷又没有层次
* 不要系统后台风
* 不要沿用当前页面结构

---

## 七、页面应当带来的感受

用户打开页面后，应该产生这样的感觉：

* 这是一个精致的活动页面
* 我很快就能进入活动
* 这个页面很清爽，不累
* 我愿意完成这个轻登录
* 下一步就是去支持喜欢的领队队长

而不是：

* 这是个很丑的表单
* 我为什么要填这些
* 这个页面像临时做的
* 我不想继续

